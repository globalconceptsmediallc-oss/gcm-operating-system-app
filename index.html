<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCM OS | AI Business Intelligence Engine</title>
  <link rel="stylesheet" href="gcm-os.css">
</head>

<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Global Concepts Media</p>
      <h1>AI Business Intelligence Engine</h1>
    </div>
    <button id="resetBtn">New Analysis</button>
  </header>

  <main class="app-shell">
    <section id="dashboardView" class="view active-view">
      <div class="hero-card">
        <p class="eyebrow">Business Intelligence Intake</p>
        <h2>Enter a business website. Generate first-contact intelligence.</h2>
        <p>
          GCM OS analyzes the business, qualifies the prospect, identifies opportunities,
          and drafts the first email and call script.
        </p>

        <div class="url-entry">
          <input id="websiteInput" type="url" placeholder="https://example.com" />
          <button id="analyzeBtn">Analyze Business</button>
        </div>
      </div>

      <div id="resultsView" class="hidden"></div>
    </section>
  </main>

  <script>
    const websiteInput = document.getElementById("websiteInput");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resultsView = document.getElementById("resultsView");

    function getDomain(url) {
      try {
        return new URL(url).hostname.replace("www.", "");
      } catch {
        return "";
      }
    }

    function formatBusinessName(domain) {
      return domain
        .split(".")[0]
        .replace(/-/g, " ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function inferIndustry(domain) {
      const d = domain.toLowerCase();

      if (d.includes("roof")) return "Roofing / Home Services";
      if (d.includes("safe")) return "Safe Sales / Security";
      if (d.includes("lock")) return "Locksmith / Security";
      if (d.includes("hvac")) return "HVAC / Home Services";
      if (d.includes("plumb")) return "Plumbing / Home Services";
      if (d.includes("law")) return "Legal Services";
      if (d.includes("dental")) return "Dental / Healthcare";
      if (d.includes("auto")) return "Automotive Services";

      return "Local Business / Service Provider";
    }

    function generateAnalysis(url) {
      const domain = getDomain(url);
      const businessName = formatBusinessName(domain);
      const industry = inferIndustry(domain);

      return {
        businessName,
        website: url,
        industry,
        qualificationScore: 88,
        readiness: "Ready for First Contact",
        missingInfo: [
          "Decision maker name",
          "Current marketing budget",
          "Lead volume",
          "Close rate",
          "Primary growth priority"
        ],
        opportunities: [
          "Improve local search visibility",
          "Create stronger service-area content",
          "Add more proof-of-work and case studies",
          "Strengthen conversion paths for high-intent visitors",
          "Build educational content that supports buyer decisions"
        ],
        email: `Subject: A few growth opportunities I noticed on ${businessName}'s website

Hi,

I spent a little time reviewing ${businessName}'s website and wanted to reach out because we help businesses improve visibility, lead generation, and customer acquisition.

You already appear to have a strong foundation, especially around your service positioning and online presence. While reviewing the site, I noticed a few areas that may create opportunities for more qualified leads, including local search visibility, stronger service-area content, and additional trust-building assets such as case studies or educational resources.

I was not reaching out to sell you anything today. I wanted to see if you would be open to a short conversation where I could share what I noticed and see whether any of it lines up with your current growth goals.

Best,
Andy Belcher
Global Concepts Media`,
        callScript: `Hi, this is Andy with Global Concepts Media.

I was reviewing ${businessName}'s website because we work with businesses that depend on local search, lead generation, and trust-based customer acquisition.

I noticed you appear to have a solid foundation, but I also saw a few opportunities that may help improve visibility and generate more qualified inquiries.

I am not calling to sell you anything today. I wanted to see if you would be open to a short conversation where I could share what I found and learn whether growth, visibility, or lead quality is something you are currently focused on.`
      };
    }

    function renderAnalysis(data) {
      resultsView.classList.remove("hidden");

      resultsView.innerHTML = `
        <section class="workspace-header">
          <div>
            <p class="eyebrow">Analysis Complete</p>
            <h2>${data.businessName}</h2>
            <p>${data.website}</p>
          </div>
          <span class="status-badge">${data.readiness}</span>
        </section>

        <div class="workspace-grid">
          <article class="card">
            <h3>Business Record</h3>
            <p><strong>Business:</strong> ${data.businessName}</p>
            <p><strong>Website:</strong> ${data.website}</p>
            <p><strong>Industry:</strong> ${data.industry}</p>
            <p><strong>Status:</strong> Draft Prospect Record</p>
          </article>

          <article class="card">
            <h3>Qualification</h3>
            <p><strong>Score:</strong> ${data.qualificationScore}%</p>
            <p><strong>Status:</strong> ${data.readiness}</p>
            <p>This prospect has enough observable information to begin first-contact outreach.</p>
          </article>

          <article class="card">
            <h3>Needs Verification</h3>
            <ul>
              ${data.missingInfo.map(item => `<li>${item}</li>`).join("")}
            </ul>
          </article>
        </div>

        <article class="card">
          <h3>Growth Opportunities</h3>
          <ul>
            ${data.opportunities.map(item => `<li>${item}</li>`).join("")}
          </ul>
        </article>

        <article class="card markdown-card">
          <h3>First Contact Email</h3>
          <pre id="emailOutput">${data.email}</pre>
          <button onclick="copyText('emailOutput')">Copy Email</button>
        </article>

        <article class="card markdown-card">
          <h3>Call Script</h3>
          <pre id="callOutput">${data.callScript}</pre>
          <button onclick="copyText('callOutput')">Copy Call Script</button>
        </article>
      `;
    }

    function copyText(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text);
    }

    analyzeBtn.addEventListener("click", () => {
      const url = websiteInput.value.trim();

      if (!url) {
        alert("Enter a business website URL.");
        return;
      }

      const analysis = generateAnalysis(url);
      renderAnalysis(analysis);
    });

    resetBtn.addEventListener("click", () => {
      websiteInput.value = "";
      resultsView.innerHTML = "";
      resultsView.classList.add("hidden");
    });
  </script>
</body>
</html>
