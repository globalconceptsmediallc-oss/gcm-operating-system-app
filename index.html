<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GCM OS Version 4 | Client Pre-Research Report</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Global Concepts Media OS</p>
      <h1>Client Pre-Research Report</h1>
      <p class="intro">
        Enter a business website and generate a practical pre-outreach research report.
      </p>
    </section>

    <section class="panel">
      <form id="researchForm">
        <label for="websiteUrl">Business Website</label>

        <div class="input-row">
          <input
            id="websiteUrl"
            type="url"
            placeholder="https://example.com"
            required
          />

          <button id="generateBtn" type="submit">
            Generate Report
          </button>
        </div>
      </form>

      <div id="statusBar" class="status">Ready.</div>
      <div id="workerVersion" class="worker-version"></div>
    </section>

    <section class="report-section">
      <h2>Report Output</h2>
      <pre id="reportOutput" class="report-output"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
