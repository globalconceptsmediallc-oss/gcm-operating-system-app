name: Website Intelligence Engine Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  website-intelligence-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Display Node Version
        run: node --version

      - name: Install Dependencies
        run: npm install

      - name: Run Website Intelligence Tests
        run: npm run test:website-intelligence
