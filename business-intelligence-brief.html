<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GCM OS | Business Intelligence Brief</title>

  <meta
    name="description"
    content="Generate a standardized Business Intelligence Brief for the Global Concepts Media Operating System."
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <header>
      <p>GCM OS Application</p>
      <h1>Business Intelligence Brief Generator</h1>
      <p>
        Complete the structured fields below to generate a repository-ready Markdown Business Intelligence Brief.
      </p>
    </header>

    <section>
      <h2>Business Profile</h2>

      <form id="briefForm">
        <label>
          Company Name
          <input type="text" id="companyName" required />
        </label>

        <label>
          Website
          <input type="url" id="website" required />
        </label>

        <label>
          Industry
          <input type="text" id="industry" required />
        </label>

        <label>
          Location
          <input type="text" id="location" />
        </label>

        <label>
          Primary Contact
          <input type="text" id="primaryContact" />
        </label>

        <label>
          Business Summary
          <textarea id="businessSummary" rows="5" required></textarea>
        </label>

        <label>
          Current Growth Opportunities
          <textarea id="growthOpportunities" rows="5"></textarea>
        </label>

        <label>
          Observed Problems or Gaps
          <textarea id="observedProblems" rows="5"></textarea>
        </label>

        <label>
          Recommended Next Action
          <textarea id="nextAction" rows="5"></textarea>
        </label>

        <button type="submit" class="button">Generate Markdown</button>
      </form>
    </section>

    <section>
      <h2>Markdown Output</h2>

      <textarea id="markdownOutput" rows="22" readonly></textarea>

      <button id="copyMarkdown" class="button" type="button">
        Copy Markdown
      </button>
    </section>
  </main>

  <script>
    const briefForm = document.getElementById("briefForm");
    const markdownOutput = document.getElementById("markdownOutput");
    const copyMarkdown = document.getElementById("copyMarkdown");

    briefForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const companyName = document.getElementById("companyName").value.trim();
      const website = document.getElementById("website").value.trim();
      const industry = document.getElementById("industry").value.trim();
      const location = document.getElementById("location").value.trim();
      const primaryContact = document.getElementById("primaryContact").value.trim();
      const businessSummary = document.getElementById("businessSummary").value.trim();
      const growthOpportunities = document.getElementById("growthOpportunities").value.trim();
      const observedProblems = document.getElementById("observedProblems").value.trim();
      const nextAction = document.getElementById("nextAction").value.trim();

      const markdown = `# Business Intelligence Brief

**Company:** ${companyName}
**Website:** ${website}
**Industry:** ${industry}
**Location:** ${location || "Not provided"}
**Primary Contact:** ${primaryContact || "Not provided"}

---

# Business Summary

${businessSummary || "Not provided"}

---

# Current Growth Opportunities

${growthOpportunities || "Not provided"}

---

# Observed Problems or Gaps

${observedProblems || "Not provided"}

---

# Recommended Next Action

${nextAction || "Not provided"}

---

# Record Information

**Generated By:** GCM OS Business Intelligence Brief Generator  
**Status:** Draft  
**Source Repository:** gcm-client-acquisition-system
`;

      markdownOutput.value = markdown;
    });

    copyMarkdown.addEventListener("click", function () {
      navigator.clipboard.writeText(markdownOutput.value);
    });
  </script>
</body>
</html>
